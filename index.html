<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procurement Performance Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

    /* ── Header ── */
    header { background: #1a1a2e; color: #fff; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .3px; }
    .header-meta { font-size: .73rem; color: #8892a4; }
    .refresh-btn { padding: 6px 16px; background: #667eea; color: #fff; border: none; border-radius: 6px; font-size: .78rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .refresh-btn:hover { background: #5a6fd6; }
    .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }
    .spin { display: inline-block; }
    .spin.active { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status bar ── */
    .status-bar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 8px 28px; display: flex; gap: 18px; align-items: center; flex-wrap: wrap; font-size: .73rem; }
    .ds-item { display: flex; align-items: center; gap: 5px; }
    .ds-dot { width: 7px; height: 7px; border-radius: 50%; background: #a0aec0; }
    .ds-dot.ok { background: #48bb78; }
    .ds-dot.err { background: #f56565; }
    .ds-dot.loading { background: #ecc94b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    .ds-label { font-weight: 700; color: #4a5568; }
    .ds-text { color: #718096; }
    .status-right { margin-left: auto; font-size: .7rem; color: #a0aec0; }

    /* ── Layout ── */
    .page { padding: 20px 28px; max-width: 1600px; margin: 0 auto; }
    .section-title { font-size: .8rem; font-weight: 700; color: #667eea; text-transform: uppercase; letter-spacing: .8px; margin: 0 0 12px; }
    .section-divider { margin: 28px 0 20px; border-top: 1px solid #e2e8f0; padding-top: 20px; }

    /* ── Grade badge ── */
    .grade { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; flex-shrink: 0; }
    .grade-A { background: #c6f6d5; color: #22543d; }
    .grade-B { background: #bee3f8; color: #1a365d; }
    .grade-C { background: #fefcbf; color: #744210; }
    .grade-D { background: #fed7aa; color: #7b341e; }
    .grade-F { background: #fed7d7; color: #742a2a; }

    /* ── Person group ── */
    .person-group { margin-bottom: 28px; }
    .person-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .person-name { font-size: .95rem; font-weight: 700; color: #2d3748; }
    .person-avg-grade { font-size: .75rem; color: #718096; }

    /* ── Market cards grid ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

    .market-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 16px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow .15s; }
    .market-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .card-header { display: flex; align-items: center; gap: 10px; }
    .card-wh { font-size: 1rem; font-weight: 800; color: #1a1a2e; }
    .card-sub { font-size: .7rem; color: #a0aec0; }
    .card-score-bar { height: 5px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
    .card-score-fill { height: 100%; border-radius: 3px; transition: width .4s; }
    .fill-A { background: #48bb78; }
    .fill-B { background: #4299e1; }
    .fill-C { background: #ecc94b; }
    .fill-D { background: #ed8936; }
    .fill-F { background: #f56565; }

    .card-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .metric { display: flex; flex-direction: column; gap: 1px; }
    .metric-label { font-size: .64rem; color: #a0aec0; text-transform: uppercase; letter-spacing: .4px; }
    .metric-value { font-size: .9rem; font-weight: 700; color: #1a1a2e; }
    .metric-delta { font-size: .65rem; font-weight: 600; }
    .delta-up { color: #48bb78; }
    .delta-dn { color: #f56565; }
    .delta-flat { color: #a0aec0; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: .62rem; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
    .tag-warn  { background: #fefcbf; color: #744210; }
    .tag-alert { background: #fed7d7; color: #742a2a; }
    .tag-ok    { background: #c6f6d5; color: #22543d; }
    .tag-info  { background: #e9d8fd; color: #44337a; }

    .no-data-card { background: #f7fafc; border: 1px dashed #cbd5e0; color: #a0aec0; font-size: .78rem; display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: 12px; text-align: center; }

    /* ── Leaderboard ── */
    .leaderboard-wrap { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
    .leaderboard-header { background: #1a1a2e; color: #fff; padding: 12px 18px; font-size: .8rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .lb-lock { font-size: .72rem; color: #8892a4; font-weight: 400; }
    table.leaderboard { width: 100%; border-collapse: collapse; font-size: .8rem; }
    table.leaderboard th { background: #f7fafc; color: #718096; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 8px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    table.leaderboard td { padding: 9px 14px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
    table.leaderboard tr:last-child td { border-bottom: none; }
    table.leaderboard tr:hover td { background: #f7fafc; }
    .rank-num { font-size: .85rem; font-weight: 800; color: #2d3748; width: 28px; }
    .rank-1 .rank-num { color: #d69e2e; }
    .rank-2 .rank-num { color: #718096; }
    .rank-3 .rank-num { color: #c05621; }
    .trend-chip { display: inline-block; font-size: .65rem; font-weight: 700; padding: 2px 6px; border-radius: 8px; }
    .trend-up { background: #c6f6d5; color: #22543d; }
    .trend-dn { background: #fed7d7; color: #742a2a; }
    .trend-flat { background: #e2e8f0; color: #718096; }

    /* ── History chart placeholder ── */
    .history-wrap { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 16px; }
    .history-select { font-size: .78rem; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 6px; color: #2d3748; }
    .history-canvas-wrap { margin-top: 12px; height: 200px; position: relative; }
    canvas#historyChart { width: 100% !important; height: 100% !important; }

    /* ── Snapshot counter ── */
    .snap-info { font-size: .72rem; color: #a0aec0; margin-bottom: 8px; }
    .snap-info strong { color: #2d3748; }

    /* ── Loading/error states ── */
    #loading-overlay { display: flex; align-items: center; justify-content: center; padding: 80px 20px; flex-direction: column; gap: 12px; }
    .spinner-lg { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #667eea; border-radius: 50%; animation: spin .8s linear infinite; }
    #loading-overlay p { font-size: .85rem; color: #718096; }

    #error-banner { background: #fed7d7; border: 1px solid #f56565; color: #742a2a; border-radius: 8px; padding: 10px 16px; font-size: .8rem; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>

<header>
  <h1>📊 Procurement Performance Tracker</h1>
  <div class="header-meta" id="last-snapshot">No snapshot yet today</div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadAndProcess()">
    <span class="spin" id="spin">↻</span> Refresh Data
  </button>
</header>

<div class="status-bar">
  <div class="ds-item"><span class="ds-dot" id="dot-inv"></span><span class="ds-label">Inventory</span><span class="ds-text" id="txt-inv">—</span></div>
  <div class="ds-item"><span class="ds-dot" id="dot-feoos"></span><span class="ds-label">FEOOS</span><span class="ds-text" id="txt-feoos">—</span></div>
  <div class="ds-item"><span class="ds-dot" id="dot-pos"></span><span class="ds-label">POs</span><span class="ds-text" id="txt-pos">—</span></div>
  <div class="status-right" id="snap-count-bar"></div>
</div>

<div class="page">
  <div id="error-banner"></div>
  <div id="loading-overlay">
    <div class="spinner-lg"></div>
    <p>Loading performance data…</p>
  </div>
  <div id="main-content" style="display:none">
    <!-- Market cards by person -->
    <div id="cards-section"></div>

    <!-- Leaderboard -->
    <div class="section-divider" id="leaderboard-section" style="display:none">
      <div class="section-title">📈 Cross-Market Leaderboard</div>
      <p class="snap-info" id="lb-snap-info"></p>
      <div class="leaderboard-wrap">
        <div class="leaderboard-header">
          Market Rankings — Size-Weighted Performance
          <span class="lb-lock" id="lb-lock"></span>
        </div>
        <table class="leaderboard" id="lb-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Market</th>
              <th>Manager</th>
              <th>Grade</th>
              <th>Score</th>
              <th>In-Stock</th>
              <th>OOS</th>
              <th>FEOOS</th>
              <th>Avg DoC</th>
              <th>7d Trend</th>
              <th>14d Trend</th>
            </tr>
          </thead>
          <tbody id="lb-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- History chart -->
    <div class="section-divider" id="history-section" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="section-title" style="margin:0">📉 In-Stock Rate History</div>
        <select class="history-select" id="history-wh" onchange="renderHistory()">
          <option value="">— Select Market —</option>
        </select>
      </div>
      <div class="history-wrap">
        <div class="history-canvas-wrap">
          <canvas id="historyChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
'use strict';

// ─── Config ──────────────────────────────────────────────────────────────────
const SNAP_KEY    = 'perf_snapshots_v1';
const MAX_DAYS    = 60;
const MIN_COMPARE = 14;

const SOURCES = {
  inv:   'https://docs.google.com/spreadsheets/d/1sPEc5rBdRB9qaJijBh4z8DK4ZVo--5xmTGbPTZ5n2nQ/export?format=csv&gid=1794766977',
  feoos: 'https://docs.google.com/spreadsheets/d/1tNBL8WXowviHwF5ywOaYl0xkUQCnr9c56Idmfx7kf8Y/export?format=csv&gid=1294742534',
  pos:   'https://docs.google.com/spreadsheets/d/1x5T4i6WrO22iGJ2-0tX8N_hrOVC4NwRRCkoA5VWMmOo/export?format=csv&gid=796468827',
};

const WH_GROUPS = [
  { name: 'Mikey Shutta',      codes: ['EWR', 'PWM'] },
  { name: 'Christian Whitney', codes: ['MDT', 'SDF'] },
  { name: 'Jason Eidom',       codes: ['CLT', 'ATL', 'MIA'] },
  { name: 'Cameron Kay',       codes: ['DFW', 'AUS', 'HOU'] },
  { name: 'John Hoban',        codes: ['DEN', 'LAX', 'BLI'] },
  { name: 'Mitzy Mojaica',     codes: ['PDX', 'SEA', 'SMF'] },
  { name: 'Tim Hibbs',         codes: ['BNA'] },
  { name: 'Unassigned',        codes: ['BOS', 'DCA'] },
];

const WH_EXCLUDE = new Set(['MHT1', 'SFO1', 'MDT1-VA']);

// ─── Helpers ─────────────────────────────────────────────────────────────────
const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
const pct = (n, d) => d > 0 ? (n / d * 100) : 0;
const fmt1 = v => v.toFixed(1);
const fmtPct = v => v.toFixed(1) + '%';
const today = () => new Date().toISOString().slice(0, 10);

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += c;
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/^"|"$/g, '').trim(); });
    return obj;
  });
}

function whGroup(whName) {
  return WH_GROUPS.find(g => g.codes.some(c => whName && whName.startsWith(c))) || null;
}

function grade(score) {
  if (score >= 88) return 'A';
  if (score >= 75) return 'B';
  if (score >= 60) return 'C';
  if (score >= 45) return 'D';
  return 'F';
}

function composite(m) {
  const inStockScore = m.inStockRate;
  const feooScore    = Math.max(0, 100 - (m.velocity > 0 ? (m.feooQty / m.velocity) * 300 : 0));
  const poScore      = Math.max(0, 100 - (m.skuCount > 0 ? (m.pastDuePOs / m.skuCount) * 400 : 0));
  const coverScore   = Math.min(m.avgDoc / 30 * 100, 100);
  return 0.40 * inStockScore + 0.25 * feooScore + 0.20 * poScore + 0.15 * coverScore;
}

function sizeWeight(m) {
  return Math.sqrt(Math.max(m.skuCount * (m.velocity + 1), 1) / 500);
}

// ─── Snapshot store ───────────────────────────────────────────────────────────
function loadSnaps() {
  try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '{}'); } catch { return {}; }
}
function saveSnaps(snaps) {
  // Prune to MAX_DAYS
  const dates = Object.keys(snaps).sort();
  if (dates.length > MAX_DAYS) dates.slice(0, dates.length - MAX_DAYS).forEach(d => delete snaps[d]);
  localStorage.setItem(SNAP_KEY, JSON.stringify(snaps));
}
function snapDayCount() { return Object.keys(loadSnaps()).length; }

// ─── State ───────────────────────────────────────────────────────────────────
const state = { inv: [], feoos: [], pos: [] };
let histChart = null;

// ─── Data load ───────────────────────────────────────────────────────────────
function setDot(key, status, text) {
  document.getElementById('dot-' + key).className = 'ds-dot ' + status;
  document.getElementById('txt-' + key).textContent = text;
}

async function loadAndProcess() {
  const btn = document.getElementById('refresh-btn');
  const spin = document.getElementById('spin');
  btn.disabled = true;
  spin.classList.add('active');
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('error-banner').style.display = 'none';

  const keys = ['inv', 'feoos', 'pos'];
  const labels = { inv: 'Inventory', feoos: 'FEOOS', pos: 'POs' };

  keys.forEach(k => setDot(k, 'loading', 'Loading…'));

  const results = await Promise.allSettled(keys.map(async k => {
    const resp = await fetch(SOURCES[k]);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    state[k] = rows;
    setDot(k, 'ok', rows.length.toLocaleString() + ' rows');
    return rows;
  }));

  let hasError = false;
  results.forEach((r, i) => {
    if (r.status === 'rejected') {
      setDot(keys[i], 'err', 'Error');
      hasError = true;
    }
  });

  if (hasError) {
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent = 'One or more data sources failed to load. Check your network and try again.';
  }

  if (state.inv.length && state.feoos.length && state.pos.length) {
    process();
  } else {
    document.getElementById('loading-overlay').innerHTML = '<p style="color:#f56565">Could not load required data.</p>';
  }

  btn.disabled = false;
  spin.classList.remove('active');
}

// ─── Process & score ──────────────────────────────────────────────────────────
function process() {
  const todayStr = today();

  // ── Build per-warehouse metrics from inventory
  const whMap = {};
  state.inv.forEach(r => {
    const wh = (r.warehouse_name || '').trim();
    if (!wh || WH_EXCLUDE.has(wh) || !/^[A-Z0-9]{2,8}(-[A-Z0-9]+)?$/.test(wh)) return;
    if (!whMap[wh]) whMap[wh] = { wh, skus: new Set(), vendors: new Set(), inStockCount: 0, oosCount: 0, totalDoc: 0, docCount: 0, velocity: 0 };
    const m = whMap[wh];
    const itemId = (r.item_uuid || r.item_name || '').trim();
    if (itemId) m.skus.add(itemId);
    const vendor = (r.full_vendor_name || r.vendor_name || '').trim();
    if (vendor) m.vendors.add(vendor);
    const onHand = num(r.on_hand_saleable_units ?? r.on_hand_units ?? r.on_hand ?? 0);
    const cons   = num(r.consumption_rate || 0);
    if (onHand > 0) m.inStockCount++;
    else m.oosCount++;
    const doc = num(r.net_days_of_cover || r.days_of_cover || 0);
    if (doc > 0) { m.totalDoc += doc; m.docCount++; }
    m.velocity += cons;
  });

  // ── FEOOS demand by warehouse
  const feooByWh = {};
  state.feoos.forEach(r => {
    const wh  = (r.warehouse_name || '').trim();
    const qty = num(r.forecasted_end_of_stock_units ?? r.feoos_qty ?? r.qty ?? 0);
    if (!wh || WH_EXCLUDE.has(wh)) return;
    feooByWh[wh] = (feooByWh[wh] || 0) + qty;
  });

  // ── Past-due POs by warehouse
  const pastDueByWh = {};
  const todayDate = new Date(); todayDate.setHours(0, 0, 0, 0);
  state.pos.forEach(p => {
    const wh  = (p.warehouse_name || '').trim();
    const exp = p.expected_receipt_date_date || p.expected_receipt_date || '';
    if (!wh || !exp || WH_EXCLUDE.has(wh)) return;
    if (p.shipment_received_utc_date && p.shipment_received_utc_date.trim()) return;
    const ordered   = num(p.purchase_order_units);
    const received  = num(p.quantity_received_pu);
    if (ordered > 0 && received >= ordered) return;
    const expDate = new Date(exp); expDate.setHours(0, 0, 0, 0);
    if (expDate < todayDate) pastDueByWh[wh] = (pastDueByWh[wh] || 0) + 1;
  });

  // ── Assemble market objects
  const markets = {};
  Object.entries(whMap).forEach(([wh, m]) => {
    const total       = m.inStockCount + m.oosCount;
    const inStockRate = total > 0 ? pct(m.inStockCount, total) : 0;
    const feooQty     = feooByWh[wh] || 0;
    const pastDuePOs  = pastDueByWh[wh] || 0;
    const avgDoc      = m.docCount > 0 ? m.totalDoc / m.docCount : 0;
    const skuCount    = m.skus.size;
    const vendorCount = m.vendors.size;
    const velocity    = m.velocity;

    const met = { wh, inStockRate, oosCount: m.oosCount, feooQty, pastDuePOs, avgDoc, skuCount, vendorCount, velocity };
    met.score     = composite(met);
    met.grade     = grade(met.score);
    met.sizeWt    = sizeWeight(met);
    met.rankScore = met.score * met.sizeWt;
    markets[wh]   = met;
  });

  // ── Snapshot today
  const snaps = loadSnaps();
  snaps[todayStr] = Object.fromEntries(
    Object.entries(markets).map(([wh, m]) => [wh, {
      inStockRate: m.inStockRate,
      oosCount:    m.oosCount,
      feooQty:     m.feooQty,
      pastDuePOs:  m.pastDuePOs,
      avgDoc:      m.avgDoc,
      skuCount:    m.skuCount,
      vendorCount: m.vendorCount,
      velocity:    m.velocity,
      score:       m.score,
      grade:       m.grade,
    }])
  );
  saveSnaps(snaps);

  // Update header
  document.getElementById('last-snapshot').textContent = 'Snapshot: ' + todayStr;
  const dayCount = Object.keys(snaps).length;
  document.getElementById('snap-count-bar').textContent = dayCount + ' day' + (dayCount !== 1 ? 's' : '') + ' of history stored';

  // ── Render
  renderCards(markets, snaps);
  renderLeaderboard(markets, snaps, dayCount);
  renderHistoryOptions(markets);

  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
}

// ─── Cards ────────────────────────────────────────────────────────────────────
function renderCards(markets, snaps) {
  const section = document.getElementById('cards-section');
  section.innerHTML = '<div class="section-title">Market Scorecard — Today</div>';

  // Get yesterday's data for deltas
  const dates = Object.keys(snaps).sort();
  const todayStr = today();
  const prevDate = dates.filter(d => d < todayStr).slice(-1)[0];
  const prevSnap = prevDate ? snaps[prevDate] : null;

  WH_GROUPS.forEach(grp => {
    // Find warehouses that belong to this group and have data
    const whList = Object.keys(markets).filter(wh => grp.codes.some(c => wh.startsWith(c))).sort();
    if (!whList.length) return;

    // Compute group average grade
    const groupScores = whList.map(wh => markets[wh].score);
    const avgScore = groupScores.reduce((a, b) => a + b, 0) / groupScores.length;
    const grpGrade = grade(avgScore);

    const grpDiv = document.createElement('div');
    grpDiv.className = 'person-group';
    grpDiv.innerHTML = `
      <div class="person-header">
        <span class="grade grade-${grpGrade}" title="Group avg score ${fmt1(avgScore)}">${grpGrade}</span>
        <div>
          <div class="person-name">${grp.name}</div>
          <div class="person-avg-grade">Avg score ${fmt1(avgScore)} · ${whList.length} market${whList.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="cards-grid" id="grid-${grp.name.replace(/\s+/g,'-')}"></div>
    `;
    section.appendChild(grpDiv);

    const grid = grpDiv.querySelector('.cards-grid');

    whList.forEach(wh => {
      const m  = markets[wh];
      const prev = prevSnap ? prevSnap[wh] : null;

      const deltaRate = prev ? (m.inStockRate - prev.inStockRate) : null;
      const deltaOOS  = prev ? (m.oosCount    - prev.oosCount)    : null;
      const deltaDoc  = prev ? (m.avgDoc       - prev.avgDoc)      : null;

      const tags = buildTags(m);

      const card = document.createElement('div');
      card.className = 'market-card';
      card.innerHTML = `
        <div class="card-header">
          <span class="grade grade-${m.grade}">${m.grade}</span>
          <div style="flex:1">
            <div class="card-wh">${wh}</div>
            <div class="card-sub">Score: ${fmt1(m.score)} · ${m.skuCount} SKUs · ${m.vendorCount} vendors</div>
          </div>
        </div>
        <div class="card-score-bar"><div class="card-score-fill fill-${m.grade}" style="width:${Math.min(m.score,100).toFixed(0)}%"></div></div>
        <div class="card-metrics">
          <div class="metric">
            <div class="metric-label">In-Stock Rate</div>
            <div class="metric-value">${fmtPct(m.inStockRate)}</div>
            ${deltaRate !== null ? `<div class="metric-delta ${deltaRate > 0.05 ? 'delta-up' : deltaRate < -0.05 ? 'delta-dn' : 'delta-flat'}">${deltaRate >= 0 ? '+' : ''}${fmt1(deltaRate)}pp vs. yesterday</div>` : ''}
          </div>
          <div class="metric">
            <div class="metric-label">OOS Items</div>
            <div class="metric-value">${m.oosCount.toLocaleString()}</div>
            ${deltaOOS !== null ? `<div class="metric-delta ${deltaOOS < 0 ? 'delta-up' : deltaOOS > 0 ? 'delta-dn' : 'delta-flat'}">${deltaOOS >= 0 ? '+' : ''}${deltaOOS} vs. yesterday</div>` : ''}
          </div>
          <div class="metric">
            <div class="metric-label">FEOOS Pressure</div>
            <div class="metric-value">${m.feooQty > 0 ? m.feooQty.toLocaleString() : '—'}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Avg Days of Cover</div>
            <div class="metric-value">${fmt1(m.avgDoc)}d</div>
            ${deltaDoc !== null ? `<div class="metric-delta ${deltaDoc > 0 ? 'delta-up' : deltaDoc < 0 ? 'delta-dn' : 'delta-flat'}">${deltaDoc >= 0 ? '+' : ''}${fmt1(deltaDoc)}d vs. yesterday</div>` : ''}
          </div>
          <div class="metric">
            <div class="metric-label">Past-Due POs</div>
            <div class="metric-value">${m.pastDuePOs > 0 ? m.pastDuePOs : '—'}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Daily Velocity</div>
            <div class="metric-value">${m.velocity > 0 ? fmt1(m.velocity) : '—'}</div>
          </div>
        </div>
        ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="tag tag-${t.type}">${t.label}</span>`).join('')}</div>` : ''}
      `;
      grid.appendChild(card);
    });
  });
}

function buildTags(m) {
  const tags = [];
  if (m.inStockRate < 85)       tags.push({ type: 'alert', label: '🔴 Low In-Stock' });
  else if (m.inStockRate < 92)  tags.push({ type: 'warn',  label: '🟡 In-Stock Watch' });
  else                           tags.push({ type: 'ok',   label: '✅ In-Stock OK' });

  if (m.feooQty > 100)           tags.push({ type: 'alert', label: '⚠️ High FEOOS' });
  else if (m.feooQty > 30)       tags.push({ type: 'warn',  label: '⚡ FEOOS Pressure' });

  if (m.pastDuePOs > 5)          tags.push({ type: 'alert', label: '🚨 POs Past Due' });
  else if (m.pastDuePOs > 0)     tags.push({ type: 'warn',  label: `📦 ${m.pastDuePOs} Past-Due PO${m.pastDuePOs > 1 ? 's' : ''}` });

  if (m.avgDoc < 14)             tags.push({ type: 'alert', label: '📉 Low Coverage' });
  else if (m.avgDoc < 21)        tags.push({ type: 'warn',  label: '📉 Coverage Watch' });

  return tags;
}

// ─── Leaderboard ─────────────────────────────────────────────────────────────
function renderLeaderboard(markets, snaps, dayCount) {
  const todayStr = today();
  const dates    = Object.keys(snaps).sort();

  document.getElementById('lb-snap-info').textContent =
    dayCount + ' day' + (dayCount !== 1 ? 's' : '') + ' of data stored. ' +
    (dayCount < MIN_COMPARE ? `Cross-market comparisons unlock at ${MIN_COMPARE} days.` : 'Full comparative ranking active.');

  if (dayCount >= MIN_COMPARE) {
    document.getElementById('leaderboard-section').style.display = 'block';
    document.getElementById('lb-lock').textContent = '';
  } else {
    document.getElementById('leaderboard-section').style.display = 'block'; // Show section with partial info
    document.getElementById('lb-lock').textContent = `(unlocks in ${MIN_COMPARE - dayCount} more day${MIN_COMPARE - dayCount !== 1 ? 's' : ''})`;
  }

  const d7  = dates.filter(d => d < todayStr).slice(-7)[0];
  const d14 = dates.filter(d => d < todayStr).slice(-14)[0];

  // Rank markets
  const ranked = Object.values(markets).sort((a, b) => b.rankScore - a.rankScore);

  const tbody = document.getElementById('lb-tbody');
  tbody.innerHTML = '';

  ranked.forEach((m, idx) => {
    const rank = idx + 1;

    // Trends
    const snap7  = d7  ? snaps[d7][m.wh]  : null;
    const snap14 = d14 ? snaps[d14][m.wh] : null;

    const trend7  = snap7  ? (m.score - snap7.score)  : null;
    const trend14 = snap14 ? (m.score - snap14.score) : null;

    const trendChip = (t) => {
      if (t === null) return '<span class="trend-chip trend-flat">—</span>';
      if (t > 1)  return `<span class="trend-chip trend-up">▲ ${fmt1(t)}</span>`;
      if (t < -1) return `<span class="trend-chip trend-dn">▼ ${fmt1(Math.abs(t))}</span>`;
      return '<span class="trend-chip trend-flat">→ flat</span>';
    };

    const grp = whGroup(m.wh);

    const tr = document.createElement('tr');
    tr.className = rank <= 3 ? `rank-${rank}` : '';
    tr.innerHTML = `
      <td><span class="rank-num">${rank}</span></td>
      <td><strong>${m.wh}</strong></td>
      <td style="font-size:.75rem;color:#718096">${grp ? grp.name : '—'}</td>
      <td><span class="grade grade-${m.grade}" style="width:28px;height:28px;font-size:.9rem">${m.grade}</span></td>
      <td><strong>${fmt1(m.score)}</strong></td>
      <td>${fmtPct(m.inStockRate)}</td>
      <td>${m.oosCount}</td>
      <td>${m.feooQty > 0 ? m.feooQty.toLocaleString() : '—'}</td>
      <td>${fmt1(m.avgDoc)}d</td>
      <td>${trendChip(trend7)}</td>
      <td>${trendChip(trend14)}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ─── History chart ────────────────────────────────────────────────────────────
function renderHistoryOptions(markets) {
  const snaps = loadSnaps();
  if (Object.keys(snaps).length < 2) return;

  const sel = document.getElementById('history-wh');
  sel.innerHTML = '<option value="">— Select Market —</option>';
  Object.keys(markets).sort().forEach(wh => {
    const opt = document.createElement('option');
    opt.value = wh; opt.textContent = wh;
    sel.appendChild(opt);
  });
  document.getElementById('history-section').style.display = 'block';
}

function renderHistory() {
  const wh = document.getElementById('history-wh').value;
  if (!wh) return;

  const snaps = loadSnaps();
  const dates = Object.keys(snaps).sort();
  const labels = dates;
  const values = dates.map(d => snaps[d][wh] ? parseFloat(snaps[d][wh].inStockRate.toFixed(2)) : null);

  const ctx = document.getElementById('historyChart').getContext('2d');
  if (histChart) histChart.destroy();

  histChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: wh + ' In-Stock Rate (%)',
        data: values,
        borderColor: '#667eea',
        backgroundColor: 'rgba(102,126,234,.1)',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: '#667eea',
        fill: true,
        tension: .3,
        spanGaps: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 10 } }, grid: { display: false } },
        y: { min: 0, max: 100, ticks: { font: { size: 10 }, callback: v => v + '%' }, grid: { color: '#f0f2f5' } }
      }
    }
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadAndProcess();
</script>
